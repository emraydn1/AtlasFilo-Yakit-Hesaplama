name: Update Fuel Prices

on:
  schedule:
    # Her gün 05:00 UTC = Yaz saati Türkiye 08:00
    - cron: "0 5 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: server

      - run: node updateFuel.js
        working-directory: server

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add server/fuel.json

          git diff --cached --quiet || git commit -m "Auto update fuel prices"

          git push
